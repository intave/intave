import org.apache.tools.ant.filters.ReplaceTokens

plugins {
  id 'java'
}

group = 'de.jpx3'
version = '14.1.0-b1'
description = 'Intave is an event- & packetbased, hyper-threaded & polyheuristic cheat detection software, providing fair play'

def fileName = "Intave"
def outputDirectory = "C:\\Users\\Richard\\Desktop\\Minecraft Plugins\\bungeecort system\\AAC\\plugins\\"

repositories {
  mavenCentral()
  maven { url = 'https://oss.sonatype.org/content/repositories/snapshots' }
  maven { url = 'https://hub.spigotmc.org/nexus/content/repositories/snapshots/' }
  maven { url = "https://repo.dmulloy2.net/nexus/repository/public/" }
}

dependencies {
  testImplementation 'org.junit.jupiter:junit-jupiter-api:5.6.0'
  testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine'
  compileOnly 'org.spigotmc:spigot-api:1.12.2-R0.1-SNAPSHOT' // The Spigot API with no shadowing. Requires the OSS repo.
  compileOnly fileTree(dir: 'libs/', include: ['*.jar'])
}

test {
  useJUnitPlatform()
}

task compileIntave(dependsOn: build) {
  doLast {
    copy {
      from "build/libs/" + fileName /*+ "-" + project.version*/ + ".jar"
      into outputDirectory
    }
  }
}

jar {
  baseName fileName
  archiveName = "${jar.baseName}.${jar.extension}"
  manifest {
    attributes(
      "Implementation-Title": "Intave",
      "Implementation-Version": project.version,
      "Implementation-Vendor": "Jpx3",
      "Main-Class": "de.jpx3.intave.IntaveApplication"
    )
  }
}

processResources {
  from "src/main/resources/plugin.yml"
  filter(ReplaceTokens, tokens: ['VERSION': project.version, 'DESCRIPTION': project.description])
}