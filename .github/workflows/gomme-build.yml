name: Obfuscates Intave on specific branch

on:
  push:
    branches: [ "gomme" ]

jobs:
  build:
    runs-on: self-hosted
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@dbbdc275be76ac10734476cc723d82dfe7ec6eda # v3.4.2
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Build Intave (gomme)
        run: ./gradlew gomme
      - name: Save artifact for upload task
        uses: actions/upload-artifact@v4
        with:
          name: raw-intave-jar
          path: build/libs/Intave.jar
  obfuscate:
    runs-on: docker
    container:
      image: registry.lennoxlotl.dev/intave/obfuscation-lite:1.0.1
      credentials:
        username: ${{ secrets.INTAVE_REGISTRY_USERNAME }}
        password: ${{ secrets.INTAVE_REGISTRY_PASSWORD }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: raw-intave-jar
          path: app/io/input.jar
      - name: Run ZKM
        shell: bash
        run: |
          /app/start.sh